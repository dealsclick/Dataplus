services:
  postgres:
    image: postgres:18
    container_name: dataplus-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: dataplus
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DATAPLUS_POSTGRES_PASSWORD:-dataplus_change_me}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dataplus"]
      interval: 10s
      timeout: 5s
      retries: 5

  dataplus:
    build:
      context: .
    container_name: dataplus
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: "4173"
      DATAPLUS_DOCKER: "1"
      DATABASE_URL: postgres://postgres:${DATAPLUS_POSTGRES_PASSWORD:-dataplus_change_me}@postgres:5432/dataplus
    ports:
      - "4173:4173"
    volumes:
      - ./data:/app/data
      - ./logos:/app/logos
      - ./logs:/app/logs
      - ./outputs:/app/outputs
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4173/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    depends_on:
      postgres:
        condition: service_healthy

  worker:
    build:
      context: .
    container_name: dataplus-worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATAPLUS_DOCKER: "1"
      DATAPLUS_BACKGROUND_JOBS_MODE: "worker"
      DATABASE_URL: postgres://postgres:${DATAPLUS_POSTGRES_PASSWORD:-dataplus_change_me}@postgres:5432/dataplus
    command: ["npm", "run", "worker"]
    volumes:
      - ./data:/app/data
      - ./logos:/app/logos
      - ./logs:/app/logs
      - ./outputs:/app/outputs
    depends_on:
      postgres:
        condition: service_healthy
      dataplus:
        condition: service_healthy

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: dataplus-public-tunnel
    profiles:
      - public
    depends_on:
      dataplus:
        condition: service_healthy
    command: tunnel --no-autoupdate --url http://dataplus:4173
    restart: unless-stopped

volumes:
  postgres-data:
